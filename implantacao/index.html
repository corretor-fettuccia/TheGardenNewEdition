<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Interativo</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-container {
      background: #111;
    }

    /* ===== ZOOM ===== */
    .leaflet-top.leaflet-right {
      margin-top: 10px;
      margin-right: 10px;
    }

    /* ===== LABEL ===== */
    .label-top {
      position: absolute;
      top: 12px;
      right: 60px;
      z-index: 999;

      color: #fff;
      font-size: clamp(11px, 1.5vw, 13px);

      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 6px;

      backdrop-filter: blur(6px);
    }

    .label-top strong {
      color: #d4af37;
    }

    /* ===== BARRA ===== */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      width: 100%;
      z-index: 999;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 10px;

      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);

      color: #fff;
      font-size: clamp(12px, 1.8vw, 14px);
    }

    .brand {
      color: #d4af37;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
    }

    .divider {
      opacity: 0.6;
    }

    .phone {
      color: #25D366;
      text-decoration: none;
      font-weight: 500;
    }

    .phone:hover {
      color: #d4af37;
    }

    /* ===== BOTÃO VOLTAR ===== */
    .btn-back {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;

      background: rgba(0,0,0,0.45);
      color: #fff;
      border: none;

      padding: 8px 14px;
      border-radius: 8px;

      font-size: 13px;
      cursor: pointer;

      backdrop-filter: blur(8px);
      transition: 0.25s;
    }

    .btn-back:hover {
      background: rgba(0,0,0,0.65);
      color: #d4af37;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {

      .label-top {
        top: 8px;
        right: 50px;
        font-size: 11px;
      }

      .btn-back {
        top: 8px;
        left: 8px;
        font-size: 12px;
      }

      .bottom-bar {
        font-size: 12px;
      }
    }

  </style>

</head>
<body>

<button class="btn-back" onclick="goBack()">← Voltar</button>

<div id="map"></div>

<div class="label-top">
  uso exclusivo <strong>newedition.com.br</strong>
</div>

<div class="bottom-bar">
  <div class="brand">
    newedition.com.br
    <span class="divider">-</span>
    <a href="https://wa.me/5551998111078" target="_blank" class="phone">
      (51) 99811-1078
    </a>
  </div>
</div>

<!-- Leaflet correto -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "https://newedition.com.br";
  }
}

const WIDTH = 5938;
const HEIGHT = 3677;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: 0,
  maxZoom: 3,
  zoomSnap: 1,
  zoomControl: false
});

L.control.zoom({ position: 'topright' }).addTo(map);

const southWest = map.unproject([0, HEIGHT], 3);
const northEast = map.unproject([WIDTH, 0], 3);
const bounds = new L.LatLngBounds(southWest, northEast);

L.tileLayer('./tiles/{z}/{x}/{y}.webp', {
  tileSize: 256,
  minZoom: 0,
  maxZoom: 3,
  noWrap: true,
  bounds: bounds
}).addTo(map);

map.fitBounds(bounds);
map.setMaxBounds(bounds);

map.options.inertia = true;
map.options.inertiaDeceleration = 2500;

</script>

</body>
</html>
